name: MeshLog
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    PRODUCT_BUNDLE_IDENTIFIER: com.meshlog.app
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Displaying mesh nodes on map
    INFOPLIST_KEY_NSLocalNetworkUsageDescription: Connect to your MeshLog server on local network
targets:
  MeshLog:
    type: application
    platform: iOS
    sources:
      - MeshLogApp.swift
      - Configuration.swift
      - path: Models
      - path: Managers
      - path: Views
    settings:
      base:
        PRODUCT_NAME: MeshLog
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    dependencies: []
schemes:
  MeshLog:
    build:
      targets:
        MeshLog: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
